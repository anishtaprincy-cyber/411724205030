<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Message Manager</title>
    <link rel="stylesheet" href="Task-3.css">
</head>
<body>

    <div class="container">
        <h1>Message Manager</h1>
        <input type="text" id="messageInput" placeholder="Enter your message">
        <p id="count">Character Count: 0</p>
        <button id="addBtn">Add Message</button>
        <button id="clearBtn">Clear All Messages</button>
        <h3>Messages</h3>
        <div id="messageContainer"></div>
        <p id="status"></p>
    </div>

<script src="Task-3.js"></script>

</body>
</html>
